name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/freewheel
      JWT_SECRET: ci-placeholder-secret
      RENDER_API_URL: ${{ secrets.RENDER_API_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Prisma
        run: npm run check:prisma

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --runInBand

      - name: Check environment documentation
        run: npm run check:env

      - name: Check Render endpoints
        if: ${{ env.RENDER_API_URL != '' }}
        run: npm run test:endpoints:render

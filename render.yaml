services:
  - type: web
    name: freewheel
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run render:start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: FRONTEND_URL
        value: https://freewheel-5a.vercel.app
